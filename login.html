<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TutorFind Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<div id="page-login" class="page active">
  <nav class="navbar">
    <div class="navbar-brand" onclick="window.location.href='index.html'">Tutor<span>Find</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="signup.html" class="nav-cta">Sign Up</a>
    </div>
  </nav>

  <div class="page-content" style="display:flex;align-items:center;justify-content:center;">
    <div style="width:100%;max-width:460px;">
      <div class="page-header" style="text-align:center;">
        <h2>Welcome <span>Back</span> 👋</h2>
        <p>Sign in to continue your learning journey</p>
      </div>

      <!-- Flash messages from URL params -->
      <div id="flash-msg"></div>

      <form class="glass form-card" action="actions/login-action.php" method="POST">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="Enter email address" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          🔐 Log In
        </button>

        <div class="form-footer">
          Don't have an account?
          <a class="form-link" href="signup.html">Sign Up Free</a>
        </div>
      </form>
    </div>
  </div>

  <footer><strong>TutorFind</strong> — Multimedia University Malaysia © 2026</footer>
</div>

<script>
// Show flash messages from URL
const params = new URLSearchParams(window.location.search);
const flashEl = document.getElementById('flash-msg');
if (params.get('error')) {
  flashEl.innerHTML = `<div class="alert alert-error" style="margin-bottom:1rem;">${params.get('error')}</div>`;
}
if (params.get('success')) {
  flashEl.innerHTML = `<div class="alert alert-success" style="margin-bottom:1rem;">${params.get('success')}</div>`;
}
</script>
</body>
</html>
