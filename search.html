<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TutorFind</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<!-- ==================== PAGE: SEARCH TUTORS ==================== -->
<div id="page-search" class="page active">
  <nav class="navbar">
    <div class="navbar-brand" onclick="showPage('home')">Tutor<span>Find</span></div>
    <div class="nav-links">
      <a onclick="showPage('home')">Home</a>
      <a onclick="showPage('login')">Log In</a>
      <a class="nav-cta" onclick="showPage('signup')">Sign Up</a>
    </div>
  </nav>
  <div class="page-content">
    <div class="page-header">
      <h2>Find Your <span>Perfect</span> Tutor</h2>
      <p>Browse verified tutors by subject, availability, and rating</p>
    </div>
    <div class="search-wrap">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Search by name or subject..." oninput="filterTutors()">
      <select id="search-subject" onchange="filterTutors()">
        <option value="">All Subjects</option>
        <option>Mathematics</option>
        <option>Physics</option>
        <option>Chemistry</option>
        <option>Biology</option>
        <option>English Language</option>
        <option>Computer Science</option>
        <option>Additional Mathematics</option>
        <option>Bahasa Malaysia</option>
      </select>
      <select id="search-avail" onchange="filterTutors()">
        <option value="">Any Availability</option>
        <option>Weekdays</option>
        <option>Weekends</option>
        <option>Evenings</option>
      </select>
      <button class="btn btn-primary btn-sm">Search</button>
    </div>
    <div class="filter-chips">
      <div class="chip active" onclick="chipFilter(this,'')">All</div>
      <div class="chip" onclick="chipFilter(this,'Mathematics')">Mathematics</div>
      <div class="chip" onclick="chipFilter(this,'Physics')">Physics</div>
      <div class="chip" onclick="chipFilter(this,'Chemistry')">Chemistry</div>
      <div class="chip" onclick="chipFilter(this,'Biology')">Biology</div>
      <div class="chip" onclick="chipFilter(this,'English Language')">English</div>
      <div class="chip" onclick="chipFilter(this,'Computer Science')">Computer Science</div>
    </div>
    <div class="grid-3" id="tutor-grid"></div>
  </div>
  <footer><strong>TutorFind</strong> — Multimedia University Malaysia © 2026</footer>
</div>
<script src="js/script.js"></script>
</body>
</html>
